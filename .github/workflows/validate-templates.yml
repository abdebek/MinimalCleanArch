name: Validate Templates

on:
  workflow_call:
  workflow_dispatch:

jobs:
  validate:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Pack libraries and templates (local feed)
        shell: pwsh
        run: |
          pwsh scripts/pack.ps1 -Configuration Release -OutputPath ./artifacts/packages

      - name: Resolve MCA package version
        id: mca-version
        shell: pwsh
        run: |
          [xml]$props = Get-Content src/Directory.Build.props
          $version = $props.Project.PropertyGroup.PackageVersion
          if ([string]::IsNullOrWhiteSpace($version)) { throw "PackageVersion not found in src/Directory.Build.props" }
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          Write-Host "MCA package version: $version"

      - name: Validate templates from source
        shell: pwsh
        run: |
          pwsh templates/scripts/validate-templates.ps1 -LocalFeedPath ./artifacts/packages -TemplatePackagePath ./artifacts/packages -McaVersion ${{ steps.mca-version.outputs.version }} -Framework net10.0

      # Optional durable messaging E2E (Testcontainers) - opt in with RUN_DOCKER_E2E
      # - name: Validate templates with durable E2E
      #   if: ${{ false }} # set to true to enable and ensure Docker is available
      #   shell: pwsh
      #   env:
      #     RUN_DOCKER_E2E: "1"
      #     RUN_DOCKER_DB: "sqlserver" # or postgres
      #   run: |
      #     pwsh templates/scripts/validate-templates.ps1 -RunDockerE2E
